version: "3.8"

services:
  tradeos:
    build:
      context: ../..
      dockerfile: TradeOS/infra/docker/Dockerfile
    image: tradeos:latest
    container_name: tradeos-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_API_HOST=0.0.0.0
      - APP_API_PORT=8000
    volumes:
      - tradeos-data:/app/data
    restart: unless-stopped

volumes:
  tradeos-data:

